<body>
<div class="wrap">
<header class="masthead detail-masthead">
<a class="homelink" href="index.html"><span class="kicker">The Front Range Herbarium</span></a>
</header>
<div class="detail">
<a class="backlink" href="index.html">‹ Back to the herbarium</a>
<h1 class="display favtitle">My favourites</h1>
<p class="legend" id="favState"></p>
<div id="favGrid"></div>
</div>
<footer>
Tap the ♥ on any plant to add or remove it here. Favourites are saved to your account.<br>
<a class="footlink" href="privacy.html">Privacy</a>
</footer>
</div>
<div class="lbox" id="lbox" role="dialog" aria-modal="true" aria-label="Photo viewer" aria-hidden="true">
<div class="lb-cap"><div class="lb-capmain"><span id="lbCount" class="lb-count"></span><span id="lbCapText"></span></div><a id="lbSrc" href="#" target="_blank" rel="noopener noreferrer">Source ↗</a></div>
<button class="rbtn lb-close" id="lbClose" aria-label="Close" title="Close">×</button>
<div class="lb-stage" id="lbStage"><img id="lbImg" alt="" draggable="false"></div>
<button class="rbtn lb-nav lb-prev" id="lbPrev" aria-label="Previous photo" title="Previous" hidden>‹</button>
<button class="rbtn lb-nav lb-next" id="lbNext" aria-label="Next photo" title="Next" hidden>›</button>
<div class="lb-hint" id="lbHint">Pinch, scroll, or double-tap to zoom · drag to pan</div>
<div class="lb-zoomctl">
<button class="rbtn" id="lbOut" aria-label="Zoom out" title="Zoom out">−</button>
<button class="rbtn" id="lbReset" aria-label="Fit to screen" title="Fit to screen">⤢</button>
<button class="rbtn" id="lbIn" aria-label="Zoom in" title="Zoom in">+</button>
</div>
</div>
